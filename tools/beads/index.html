<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>KX拼豆像素图</title>
    <script src="https://unpkg.com/vue@3.4.27/dist/vue.global.prod.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
</head>
<body>
<div id="app">
    <div class="container">
        <div class="top-bar">
            <div class="top-bar-row">
                <div class="left-group">
                    <h1>🧩 KX拼豆图</h1>
                    <div class="color-mode-select">
                        <button
                            v-for="opt in COLOR_MODES"
                            :key="opt.mode"
                            class="color-mode-option"
                            :class="{ active: colorMode === opt.mode }"
                            @click="onColorModeClick(opt.mode)"
                        >{{ opt.label }}</button>
                    </div>
                </div>

                <div class="right-group">
                    <label class="text-btn" title="导入图片">
                        📁 导入
                        <input
                            type="file"
                            ref="fileInputRef"
                            accept="image/png, image/webp, image/jpeg, image/gif"
                            style="display:none"
                            @change="onFileChange"
                        >
                    </label>
                    <button class="text-btn" title="导出图片" @click="onExport">💾 导出</button>
                </div>
            </div>

            <div class="top-bar-row">
                <div class="left-group">
                    <div class="coord-display">
                        &#x1F4CD; 坐标 <span class="inner">{{ coordText }}</span>
                        <span class="inner" style="margin-left: 0.5rem;">{{ canvasSizeText }}</span>
                    </div>
                </div>

                <div class="right-group">
                    <div class="coord-display">
                        &#x1F4CA; <span class="inner">{{ statsTotal }}</span>
                    </div>
                </div>
            </div>
        </div>

        <div
            class="canvas-wrapper"
            ref="wrapperRef"
            :class="{ grabbing: isGrabbing }"
        >
            <canvas
                ref="canvasRef"
                @mousedown="onCanvasMouseDown"
                @mouseleave="onCanvasMouseLeave"
                @wheel.prevent="onCanvasWheel"
                @touchstart.prevent="onCanvasTouchStart"
                @touchmove.prevent="onCanvasTouchMove"
                @touchend="onCanvasTouchEnd"
            ></canvas>
        </div>

        <div class="stats-bar">
            <span
                v-for="item in sortedStats"
                :key="item.code"
                class="stats-tag"
                :class="{ highlight: highlightCode === item.code }"
                @click="onTagClick(item.code)"
            >
                <span class="swatch" :style="{ background: item.colorHex }"></span>
                <span class="code">{{ item.code }}</span>
                <span class="count">{{ item.count }}</span>
            </span>
        </div>

        <div class="bottom-bar">
            <button class="text-btn" :class="{ active: showGrid }" title="网格" @click="onToggleGrid">🔲 网格</button>
            <button class="text-btn" :class="{ active: showColorCode }" title="显示色号" @click="onToggleColorCode">#️⃣ 色号</button>
            <button class="text-btn" title="左右镜像" @click="onMirror">🪞 镜像</button>
            <button ref="settingsBtnRef" class="text-btn" title="设置" @click.stop="onSettingsToggle">⚙️ 设置</button>

            <div
                v-show="settingsOpen"
                ref="settingsPanelRef"
                class="settings-panel"
            >
                <div class="settings-row">
                    <span class="label">像素</span>
                    <button class="icon-btn small" title="减小" @click="onDecreasePixelScale">−</button>
                    <span class="value">{{ pixelScaleLabel }}</span>
                    <button class="icon-btn small" title="增大" @click="onIncreasePixelScale">+</button>
                </div>
                <div class="settings-row">
                    <span class="label">背景</span>
                    <input type="color" :value="bgColor" title="背景色" @input="onBgColorInput">
                </div>
                <div class="settings-row">
                    <span class="label">网格</span>
                    <input type="color" :value="gridColor" title="网格颜色" @input="onGridColorInput">
                </div>
                <div class="settings-row">
                    <span class="label">作者</span>
                    <input type="text" v-model="authorName" placeholder="输入作者名" @input="onAuthorNameInput" style="font-size: 0.7rem; padding: 0.2rem 0.4rem; border: 1px solid #e7cfbc; border-radius: 0.3rem;">
                </div>
            </div>
        </div>
    </div>

    <div v-if="cropModalOpen" class="modal-overlay" @click.self="onCropCancel">
        <div class="crop-modal">
            <div class="crop-header">
                <span>选择裁剪区域</span>
                <div class="crop-buttons">
                    <button class="crop-btn confirm" @click="onCropConfirm">确认</button>
                    <button class="crop-btn" @click="onCropImportOriginal">导入原图</button>
                    <button class="crop-btn cancel" @click="onCropCancel">取消</button>
                </div>
            </div>
            <div class="crop-container">
                <img ref="cropImageRef" :src="cropImageSrc" class="crop-image">
            </div>
        </div>
    </div>
</div>

<script src="./crop.js"></script>
<script src="./app.js"></script>
</body>
</html>
